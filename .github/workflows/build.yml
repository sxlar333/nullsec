name: Build NullSec

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.5.1)"
        required: true
        default: "0.0.1"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: powershell
        run: |
          if (Test-Path nullsec\requirements.txt) {
            pip install -r nullsec\requirements.txt
          }

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        shell: powershell
        run: |
          cd nullsec
          pyinstaller launcher.py --onefile --name NullSec

      - name: Rename artifact
        shell: powershell
        run: |
          $version = "${{ github.event.inputs.version }}"
          Rename-Item "nullsec\dist\NullSec.exe" "nullsec\dist\NullSec-v$version.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NullSec-v${{ github.event.inputs.version }}
          path: nullsec/dist/NullSec-v${{ github.event.inputs.version }}.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: NullSec v${{ github.event.inputs.version }}
          files: nullsec/dist/NullSec-v${{ github.event.inputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}